        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
        }

        * {
            font-feature-settings: "liga" 1, "kern" 1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            color: #e2e8f0;
        }


        .hero-section {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='2'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
            opacity: 0.4;
        }

        .metric-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            transform: translateY(0);
        }

        .metric-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .score-excellent { color: var(--success); }
        .score-good { color: var(--primary); }
        .score-warning { color: var(--warning); }
        .score-poor { color: var(--error); }

        .difficulty-pill {
            font-size: 0.75rem;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .difficulty-easy {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .difficulty-medium {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .difficulty-hard {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .difficulty-adversarial {
            background: rgba(147, 51, 234, 0.1);
            color: #9333ea;
            border: 1px solid rgba(147, 51, 234, 0.2);
        }

        .fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .fade-in-delay-1 { animation-delay: 0.1s; }
        .fade-in-delay-2 { animation-delay: 0.2s; }
        .fade-in-delay-3 { animation-delay: 0.3s; }
        .fade-in-delay-4 { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            height: 6px;
            border-radius: 3px;
            transition: width 0.8s ease-out;
        }

        .table-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .expandable-row {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        .expandable-row:hover {
            border-left-color: var(--primary);
            background-color: rgba(14, 165, 233, 0.05);
        }

        .golf-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 2rem 0;
        }

        .dropdown-select {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 8px 16px;
            font-weight: 500;
            color: #e2e8f0;
            transition: all 0.3s ease;
        }

        .dropdown-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
    </style>
</head>

    if (percentage >= 90) return 'score-excellent';
    if (percentage >= 70) return 'score-good';
    if (percentage >= 50) return 'score-warning';
    return 'score-poor';
}

function formatScore(score, decimals = 1) {
    return typeof score === 'number' ? score.toFixed(decimals) : score;
}

function formatCategoryName(category) {
    const categoryMap = {
        'embedded': 'embedded lies',
        'preferred_lies': 'preferred lies',
        'ball_in_motion': 'ball in motion',
        'ball_moved': 'ball moved',
        'penalty_area': 'penalty area',
        'lost_ball': 'lost ball',
        'putting_green': 'putting green',
        'match_play': 'match play'
    };
    return categoryMap[category] || category.replace('_', ' ');
}
</script>

<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

function Dashboard() {
    const versions = Object.keys(EVAL_DATA).sort().reverse();
    const [selectedVersion, setSelectedVersion] = useState(versions[0]);
    const [expandedCase, setExpandedCase] = useState(null);
    const [caseFilter, setCaseFilter] = useState('all');
    const [caseSortBy, setCaseSortBy] = useState('total');
    const [isLoaded, setIsLoaded] = useState(false);

    useEffect(() => {
        setIsLoaded(true);
    }, []);

    const currentData = EVAL_DATA[selectedVersion];
    const { summary, manifest, grades } = currentData;

    const weakestCategory = useMemo(() => {
        const categories = Object.entries(summary.category_breakdown)
            .sort(([,a], [,b]) => a.avg - b.avg);
        return categories[0] ? {
            name: categories[0][0],
            score: categories[0][1].avg
        } : {name: 'N/A', score: 0};
    }, [summary]);

    const filteredSortedCases = useMemo(() => {
        let filtered = grades;

        if (caseFilter !== 'all') {
            if (caseFilter === 'pass') {
                filtered = grades.filter(g => g.total >= 7);
            } else if (caseFilter === 'fail') {
                filtered = grades.filter(g => g.total < 7);
            } else {
                filtered = grades.filter(g => g.difficulty === caseFilter || g.category === caseFilter);
            }
        }

        return filtered.sort((a, b) => {
            if (caseSortBy === 'total') return b.total - a.total;
            if (caseSortBy === 'difficulty') {
                const order = ['easy', 'medium', 'hard', 'adversarial'];
                return order.indexOf(a.difficulty) - order.indexOf(b.difficulty);
            }
            if (caseSortBy === 'category') return a.category.localeCompare(b.category);
            return 0;
        });
    }, [grades, caseFilter, caseSortBy]);

    return (
        <div className="min-h-screen">
            {/* Compact Header */}
            <section className="hero-section relative">
                <div className="relative z-10">
                    <div className="max-w-7xl mx-auto px-6 py-8">
                        <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-8">
                            <div>
                                <h1 className="text-4xl font-bold text-white mb-2">
                                    Golf Rules Evaluation Dashboard
                                </h1>
                                <p className="text-blue-100 max-w-2xl">
                                    AI performance across 40 golf rules scenarios
                                    <br />Graded on accuracy, completeness, format, and guardrails
                                </p>
                            </div>

                            <div className="flex items-center space-x-8 text-white">
                                <div className="text-center">
                                    <div className="text-3xl font-bold">
                                        {formatScore(summary.overall_average, 2)}
                                    </div>
                                    <div className="text-sm text-blue-100">Overall Score</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-3xl font-bold">
                                        {summary.total_questions}
                                    </div>
                                    <div className="text-sm text-blue-100">Test Cases</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-3xl font-bold">
                                        {((summary.overall_average / summary.max_possible_score) * 100).toFixed(1)}%
                                    </div>
                                    <div className="text-sm text-blue-100">Performance</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            {/* Main Content */}
            <div className="max-w-7xl mx-auto px-6 py-8">

                {/* Version Selector & Metadata */}
                <div className={`mb-6 ${isLoaded ? 'fade-in fade-in-delay-3' : ''}`}>
                    <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between mb-4">
                        <h2 className="text-2xl font-semibold text-gray-100">
                            Evaluation Details
                        </h2>
                        <div className="mt-2 lg:mt-0">
                            <select
                                value={selectedVersion}
                                onChange={(e) => setSelectedVersion(e.target.value)}
                                className="dropdown-select"
                            >
                                {versions.map(v => (
                                    <option key={v} value={v}>{v}</option>
                                ))}
                            </select>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-x-6 gap-y-2 text-sm max-w-xl">
                        <div>
                            <span className="text-gray-500">Model:</span>
                            <span className="ml-2 font-medium text-gray-100">
                                {manifest.model.includes('haiku') ? 'Claude 3 Haiku' :
                                 manifest.model.includes('sonnet') ? 'Claude 3 Sonnet' :
                                 manifest.model.includes('opus') ? 'Claude 3 Opus' : 'Claude'}
                            </span>
                        </div>
                        <div>
                            <span className="text-gray-500">Date:</span>
                            <span className="ml-2 font-medium text-gray-100">
                                {new Date(manifest.timestamp).toLocaleDateString()}
                            </span>
                        </div>
                        <div>
                            <span className="text-gray-500">Commit:</span>
                            <span className="ml-2 font-mono font-medium text-gray-100">{manifest.commit_hash}</span>
                        </div>
                        <div>
                            <span className="text-gray-500">Changes:</span>
                            <span className="ml-2 font-medium text-gray-100">{manifest.changes_from_previous}</span>
                        </div>
                    </div>
                </div>

                {/* Key Metrics */}
                <div className={`grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-16 ${isLoaded ? 'fade-in fade-in-delay-4' : ''}`}>
                    <div className="metric-card p-8 text-center">
                        <div className="text-4xl font-bold text-gray-100 mb-2">{summary.total_questions}</div>
                        <div className="text-gray-400 font-medium">Test Cases</div>
                        <div className="text-sm text-gray-500 mt-2">Across 4 difficulty tiers</div>
                    </div>

                    <div className="metric-card p-8 text-center">
                        <div className="text-4xl font-bold text-red-600 mb-2">
                            {Object.values(summary.fail_conditions).reduce((a, b) => a + b, 0)}
                        </div>
                        <div className="text-gray-400 font-medium">Fail Conditions</div>
                        <div className="text-sm text-gray-500 mt-2">Guardrail violations</div>
                    </div>

                    <div className="metric-card p-8 text-center">
                        <div className={`text-4xl font-bold mb-2 ${getScoreClass(weakestCategory.score)}`}>
                            {formatScore(weakestCategory.score)}
                        </div>
                        <div className="text-gray-400 font-medium">Weakest Category</div>
                        <div className="text-sm text-gray-500 mt-2 capitalize">{formatCategoryName(weakestCategory.name)}</div>
                    </div>

                    <div className="metric-card p-8 text-center">
                        <div className="text-4xl font-bold text-green-600 mb-2">
                            {summary.score_distribution['10'] || 0}
                        </div>
                        <div className="text-gray-400 font-medium">Perfect Scores</div>
                        <div className="text-sm text-gray-500 mt-2">10/10 responses</div>
                    </div>
                </div>

                <div className="golf-divider"></div>

                {/* Difficulty Breakdown */}
                <div className="mb-16">
                    <h2 className="text-3xl font-semibold text-gray-100 mb-8">Performance by Question Difficulty</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {Object.entries(summary.difficulty_breakdown).map(([difficulty, data], index) => (
                            <div key={difficulty} className={`metric-card p-8 ${isLoaded ? `fade-in fade-in-delay-${index + 1}` : ''}`}>
                                <div className={`difficulty-pill difficulty-${difficulty} mb-4 inline-block`}>
                                    {difficulty}
                                </div>
                                <div className={`text-3xl font-bold mb-2 ${getScoreClass(data.avg)}`}>
                                    {formatScore(data.avg)}
                                </div>
                                <div className="text-gray-400 font-medium mb-4">Average Score</div>
                                <div className="bg-gray-700 rounded-full h-3 mb-2">
                                    <div
                                        className="progress-bar h-full rounded-full"
                                        style={{
                                            width: `${(data.avg / 10) * 100}%`,
                                            animationDelay: `${index * 0.2}s`
                                        }}
                                    ></div>
                                </div>
                                <div className="text-sm text-gray-500">{data.count} cases</div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Score Distribution & Categories */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-16">
                    <div className="metric-card p-8">
                        <h3 className="text-2xl font-semibold text-gray-100 mb-6">Score Distribution</h3>
                        <div className="space-y-3">
                            {Object.entries(summary.score_distribution)
                                .sort(([a], [b]) => parseInt(b) - parseInt(a))
                                .map(([score, count]) => (
                                <div key={score} className="flex items-center space-x-4">
                                    <div className="font-mono font-semibold text-gray-300 w-12 text-sm">
                                        {score}/10
                                    </div>
                                    <div className="flex-1">
                                        <div className="bg-gray-700 rounded-full h-3">
                                            <div
                                                className="progress-bar h-full rounded-full transition-all duration-700"
                                                style={{width: `${(count / Math.max(...Object.values(summary.score_distribution))) * 100}%`}}
                                            ></div>
                                        </div>
                                    </div>
                                    <div className="font-semibold text-gray-100 w-8 text-right text-sm">{count}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="metric-card p-8">
                        <h3 className="text-2xl font-semibold text-gray-100 mb-6">Fail Conditions</h3>
                        <div className="space-y-6">
                            {Object.entries(summary.fail_conditions).map(([condition, count]) => (
                                <div key={condition} className="flex justify-between items-center">
                                    <div>
                                        <div className="font-semibold text-gray-100">{condition}</div>
                                        <div className="text-sm text-gray-500">
                                            {condition === 'Cited rule number' ? 'Automatic detection' : 'Manual review'}
                                        </div>
                                    </div>
                                    <div className="text-3xl font-bold text-red-600">{count}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>

                {/* Category Performance Table */}
                <div className="metric-card overflow-hidden mb-16">
                    <div className="table-header p-6">
                        <h3 className="text-2xl font-semibold">Category Performance</h3>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead>
                                <tr className="border-b border-gray-600 bg-gray-800">
                                    <th className="text-left p-4 font-semibold text-gray-200">Category</th>
                                    <th className="text-right p-4 font-semibold text-gray-200">Average Score</th>
                                    <th className="text-right p-4 font-semibold text-gray-200">Cases</th>
                                    <th className="text-right p-4 font-semibold text-gray-200">Performance</th>
                                </tr>
                            </thead>
                            <tbody>
                                {Object.entries(summary.category_breakdown)
                                    .sort(([,a], [,b]) => a.avg - b.avg)
                                    .map(([category, data], index) => (
                                    <tr key={category} className="border-b border-gray-600 hover:bg-gray-700 transition-colors">
                                        <td className="p-4 font-medium text-gray-100 capitalize">
                                            {formatCategoryName(category)}
                                        </td>
                                        <td className={`text-right p-4 font-bold text-lg ${getScoreClass(data.avg)}`}>
                                            {formatScore(data.avg)}
                                        </td>
                                        <td className="text-right p-4 text-gray-400">{data.count}</td>
                                        <td className="text-right p-4">
                                            <div className="w-20 bg-gray-700 rounded-full h-2 ml-auto">
                                                <div
                                                    className="progress-bar h-full rounded-full"
                                                    style={{width: `${(data.avg / 10) * 100}%`}}
                                                ></div>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>

                {/* Case Details */}
                <div className="metric-card">
                    <div className="table-header p-6 flex justify-between items-center">
                        <h3 className="text-2xl font-semibold">Individual Case Performance</h3>
                        <div className="flex space-x-4">
                            <select
                                value={caseFilter}
                                onChange={(e) => setCaseFilter(e.target.value)}
                                className="dropdown-select text-sm"
                            >
                                <option value="all">All Cases</option>
                                <option value="pass">Pass (≥7)</option>
                                <option value="fail">Fail (&lt;7)</option>
                                <option value="easy">Easy</option>
                                <option value="medium">Medium</option>
                                <option value="hard">Hard</option>
                                <option value="adversarial">Adversarial</option>
                            </select>
                            <select
                                value={caseSortBy}
                                onChange={(e) => setCaseSortBy(e.target.value)}
                                className="dropdown-select text-sm"
                            >
                                <option value="total">Sort by Score</option>
                                <option value="difficulty">Sort by Difficulty</option>
                                <option value="category">Sort by Category</option>
                            </select>
                        </div>
                    </div>

                    <div className="divide-y divide-gray-600">
                        {filteredSortedCases.map(case_data => {
                            const isExpanded = expandedCase === case_data.id;

                            return (
                                <div key={case_data.id}>
                                    <div
                                        className="expandable-row p-6 cursor-pointer"
                                        onClick={() => setExpandedCase(isExpanded ? null : case_data.id)}
                                    >
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-center space-x-4 mb-3">
                                                    <span className="font-mono text-sm font-semibold text-gray-400">
                                                        {case_data.id}
                                                    </span>
                                                    <span className={`difficulty-pill difficulty-${case_data.difficulty}`}>
                                                        {case_data.difficulty}
                                                    </span>
                                                    <span className="text-sm text-gray-500 capitalize">
                                                        {formatCategoryName(case_data.category)}
                                                    </span>
                                                    {case_data.fail_conditions_triggered.length > 0 && (
                                                        <span className="bg-red-100 text-red-800 px-3 py-1 rounded-full text-xs font-semibold">
                                                            FAIL: {case_data.fail_conditions_triggered.join(', ')}
                                                        </span>
                                                    )}
                                                </div>
                                                <p className="text-gray-300 leading-relaxed">{case_data.question}</p>
                                            </div>
                                            <div className="ml-6 text-right">
                                                <div className={`text-3xl font-bold ${getScoreClass(case_data.total)}`}>
                                                    {case_data.total}
                                                </div>
                                                <div className="text-sm text-gray-500">/10</div>
                                            </div>
                                        </div>
                                    </div>

                                    {isExpanded && (
                                        <div className="border-t border-gray-600 bg-gray-800 p-6">
                                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                                                <div className="text-center">
                                                    <div className="text-sm text-gray-500 mb-1">Accuracy</div>
                                                    <div className={`text-2xl font-bold ${getScoreClass(case_data.accuracy, 2)}`}>
                                                        {case_data.accuracy}/2
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <div className="text-sm text-gray-500 mb-1">Completeness</div>
                                                    <div className={`text-2xl font-bold ${getScoreClass(case_data.completeness, 2)}`}>
                                                        {case_data.completeness}/2
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <div className="text-sm text-gray-500 mb-1">Format</div>
                                                    <div className={`text-2xl font-bold ${getScoreClass(case_data.format, 2)}`}>
                                                        {case_data.format}/2
                                                    </div>
                                                </div>
                                                <div className="text-center">
                                                    <div className="text-sm text-gray-500 mb-1">Guardrails</div>
                                                    <div className={`text-2xl font-bold ${getScoreClass(case_data.guardrails, 2)}`}>
                                                        {case_data.guardrails}/2
                                                    </div>
                                                </div>
                                            </div>

                                            <div>
                                                <h4 className="font-semibold text-gray-100 mb-3">Grader Analysis:</h4>
                                                <p className="text-gray-300 leading-relaxed bg-white p-4 rounded-lg border border-gray-200">
                                                    {case_data.reasoning}
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <div className="p-6 border-t border-gray-600 bg-gray-800 text-center text-gray-400">
                        Showing {filteredSortedCases.length} of {grades.length} cases
                    </div>
                </div>
            </div>
        </div>
    );
}

ReactDOM.render(<Dashboard />, document.getElementById('root'));
</script>

</body>
</html>
